# 宿主项目根目录。当前 Ai-agent 作为 ad-plex 同级目录独立运行。
host_project_root: "../ad-plex"

server:
  host: "127.0.0.1"
  port: 8765
  reload: true

agent:
  model: "composer-2.5"
  # local: 直接操作本机宿主项目；cloud: 在 Cursor 云端 VM 上跑（需配置 cloud 段）
  runtime: "local"
  cloud:
    repo_url: ""
    starting_ref: "main"
    auto_create_pr: false
