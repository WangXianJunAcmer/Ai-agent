# Agent 工作区根目录（相对本仓库）。默认 "." = 本仓库自身；改其它代码目录如 "../my-app"。
host_project_root: "."

server:
  host: "0.0.0.0"
  port: 8765
  # Agent writes under the workspace — never enable reload while serving chat SSE.
  reload: false

agent:
  # cursor | openai | deepseek — see backend/providers/
  provider: "cursor"
  model: "composer-2.5"
  # local: 本机工作区；cloud: Cursor 云端 VM（需配置 cloud）
  runtime: "local"
  allow_repo_write: true
  safety_enabled: true
  cloud:
    repo_url: ""
    starting_ref: "main"
    auto_create_pr: false

providers:
  openai:
    base_url: "https://api.openai.com/v1"
    # openai SDK + local tools; models in providers/compat_agent.py
  deepseek:
    base_url: "https://api.deepseek.com"
    # Same stack as openai; only base_url + DEEPSEEK_API_KEY differ
