# 宿主项目根目录。默认指向 Ai-agent 自身；嵌入其他项目时改成相对路径，如 "../ad-plex"。
host_project_root: "."

server:
  host: "0.0.0.0"
  port: 8765
  reload: true

agent:
  model: "composer-2.5"
  # local: 直接操作本机宿主项目；cloud: 在 Cursor 云端 VM 上跑（需配置 cloud 段）
  runtime: "local"
  # false = 只读（拦截 Write/StrReplace/Delete 与写文件 Shell）；敏感文件读取始终拦截
  allow_repo_write: true
  cloud:
    repo_url: ""
    starting_ref: "main"
    auto_create_pr: false
